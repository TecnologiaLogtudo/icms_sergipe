services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-vps-app
    restart: unless-stopped
    ipc: host
    init: true
    security_opt:
      - seccomp=seccomp-playwright.json
    env_file:
      - .env
    environment:
      - TZ=America/Bahia
      - LOG_LEVEL=INFO
      - PLAYWRIGHT_HEADLESS=true
      - SCHEDULE_HOUR=8
      - SCHEDULE_MINUTE=0
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - app_downloads:/app/downloads

volumes:
  app_data:
  app_logs:
  app_downloads:
