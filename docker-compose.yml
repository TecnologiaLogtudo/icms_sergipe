services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-vps-app
    restart: unless-stopped
    ipc: host
    init: true
    security_opt:
      - seccomp=seccomp-playwright.json
    env_file:
      - .env
    environment:
      - TZ=America/Bahia
      - LOG_LEVEL=INFO
      - PLAYWRIGHT_HEADLESS=true
      - SCHEDULE_HOUR=8
      - SCHEDULE_MINUTE=0
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - app_downloads:/app/downloads
    healthcheck:
      test: ["CMD", "python", "-c", "import os; import time; log_file='/app/logs/app.log'; print('OK') if os.path.exists(log_file) and (time.time() - os.path.getmtime(log_file) < 3600) else exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app_data:
  app_logs:
  app_downloads:
